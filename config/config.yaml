# Herald Configuration File

# Ranking configuration
ranking:
  # Weights for different ranking factors (must sum to 1.0)
  weights:
    relevance: 0.65  # Combined semantic + lexical query fit
    recency: 0.2     # Publication recency score
    citations: 0.1   # Citation count score
    quality: 0.05    # Abstract completeness / matchability

  # Internal breakdown for query relevance scoring
  relevance_components:
    semantic_similarity: 0.55
    lexical_overlap: 0.2
    title_overlap: 0.2
    phrase_match: 0.05
  
  # Recency decay: newer work is rewarded more aggressively
  recency_decay_days: 365

  # Abstracts longer than this many words are treated as "fully informative"
  abstract_length_saturation: 180

# Model configuration
models:
  # Sentence transformer model for embeddings
  embedding_model: "all-MiniLM-L6-v2"

# Citation fetching configuration
citation:
  enabled: true  # Enable/disable citation fetching
  rate_limit_delay: 0.1  # Delay between API calls (seconds)
  normalization_max_citations: 1000  # Max citations for normalization

# Data collection configuration
data_collection:
  max_results: 100  # Default max results for searches
  default_sort: "relevance"  # submitted_date, relevance, last_updated_date
  default_sort_order: "descending"  # ascending or descending

# News aggregation configuration
news:
  default_sources:
    - "hackernews"
    - "lobsters"
    - "reddit-programming"
    - "reddit-technology"
    - "techcrunch"
    - "openai-news"
    - "anthropic-news"
    - "google-blog"
    - "google-developers"
    - "google-research"
    - "google-deepmind"
    - "nvidia-blog"
    - "nvidia-news"
    - "nvidia-generative-ai"
    - "nvidia-developer"
    - "huggingface-blog"
    - "microsoft-ai"
    - "x"
  max_items_per_source: 30
  request_timeout_seconds: 8.0
  # Optional X support can be provided through one of these env vars:
  # HERALD_X_RSS_SEARCH_URL="https://your-rss-bridge.example/search?query={query}"
  # HERALD_X_RSS_LATEST_URL="https://your-rss-bridge.example/latest"

# Processing configuration
processing:
  process_metadata: true  # Process article metadata
  process_text: true      # Process article text
